<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER - Genera Apps con IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 60px; 
            padding-bottom: 20px; 
            border-bottom: 2px solid #00D4FF;
        }
        .logo { 
            font-size: 2.5em; 
            color: #00D4FF; 
            font-weight: bold;
        }
        .hero {
            text-align: center;
            margin-bottom: 60px;
        }
        .hero h1 {
            font-size: 3.5em;
            color: #00D4FF;
            margin-bottom: 20px;
        }
        .cta-btn {
            background: linear-gradient(135deg, #00D4FF, #0099cc);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cta-btn:hover {
            transform: scale(1.05);
        }
        .form-section {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid #00D4FF;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00D4FF;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #1a1f3a;
            border: 1px solid #00D4FF;
            color: #e0e0e0;
            border-radius: 5px;
        }
        .status { 
            padding: 15px; 
            border-radius: 5px; 
            margin: 15px 0;
            text-align: center;
        }
        .status.success { 
            background: rgba(0, 255, 136, 0.2); 
            color: #00ff88; 
            border: 1px solid #00ff88;
        }
        .status.error { 
            background: rgba(255, 0, 0, 0.2); 
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }
        .dashboard { display: none; }
        .dashboard.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="logo">⚡ AETHER</div>
        </div>

        <div id="home">
            <div class="hero">
                <h1>⚡ AETHER</h1>
                <p>Genera apps full-stack con IA en segundos</p>
            </div>

            <div class="form-section">
                <h2 style="color: #00D4FF; margin-bottom: 20px;">Registrarse (Gratis)</h2>
                <div class="form-group">
                    <label>Tu email</label>
                    <input type="email" id="email-input" placeholder="tu@email.com">
                </div>
                <button class="cta-btn" onclick="handleSignup()" style="width: 100%;">Crear Cuenta</button>
                <div id="signup-message"></div>
            </div>
        </div>

        <div id="dashboard" class="dashboard">
            <h2 style="color: #00D4FF;">Dashboard</h2>
            <p>Email: <span id="user-email-display"></span></p>
            <p>Apps: <span id="apps-display">0</span>/1</p>
        </div>
    </div>

    <script>
        async function handleSignup() {
            const email = document.getElementById("email-input").value.trim();
            const messageDiv = document.getElementById("signup-message");
            
            if (!email) {
                messageDiv.innerHTML = '<div class="status error">❌ Por favor ingresa tu email</div>';
                return;
            }

            messageDiv.innerHTML = '<div class="status" style="background: rgba(0, 212, 255, 0.2); color: #00D4FF;">⏳ Registrando...</div>';

            try {
                const response = await fetch("http://localhost:8001/auth/signup?email=" + encodeURIComponent(email), {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.innerHTML = '<div class="status success">✅ ¡Cuenta creada exitosamente!</div>';
                    document.getElementById("user-email-display").textContent = data.user.email;
                    document.getElementById("apps-display").textContent = data.user.apps_used;
                    
                    setTimeout(() => {
                        document.getElementById("home").style.display = "none";
                        document.getElementById("dashboard").classList.add("active");
                    }, 1500);
                } else {
                    messageDiv.innerHTML = '<div class="status error">❌ Error: ' + (data.detail || "Error desconocido") + '</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="status error">❌ Error de conexión: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
